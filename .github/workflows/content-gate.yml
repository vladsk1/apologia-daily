name: Content review gate

# Enforces the CLAUDE.md content pipeline for CHANGED content files: every new
# or modified essay / hub fragment / worldviews page / reel script / live AI
# prompt must carry a content-review stamp recording that the argument and
# orthodoxy gates ran (see tools/check-content-review.mjs). The answers layer
# has its own gate in tools/gen-answers.mjs and is excluded here.
#
# This reports a red/green status on the commit or PR. To make it BLOCKING,
# enable branch protection on `main` and mark "Content review gate" a required
# check (Settings → Branches) — with a PR-based flow rather than direct pushes.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  content-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to diff changed files against the base

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Determine base ref
        id: base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          else
            # push: diff against the commit that was there before this push
            base="${{ github.event.before }}"
            if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
              base="HEAD~1"
            fi
            echo "ref=$base" >> "$GITHUB_OUTPUT"
          fi

      - name: Check content-review stamps on changed files
        run: node tools/check-content-review.mjs --changed ${{ steps.base.outputs.ref }}

  nav-consistency:
    # Fails if any non-gated page's nav menu has drifted from the canonical menu
    # in tools/sync-nav.mjs. Fix: run `node tools/sync-nav.mjs` and commit.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check nav menu is in sync
        run: node tools/sync-nav.mjs --check
      - name: Check search index is in sync
        run: node tools/build-search-index.mjs --check
      - name: Check source library index is in sync
        run: node tools/build-sources-index.mjs --check
      - name: Check argument-briefs index is in sync
        run: node tools/build-briefs-index.mjs --check

  orthodoxy-guards:
    # Doctrinal regression guards over the WHOLE corpus (not just changed files).
    # tripwire scan is blocking (fails on a newly-introduced heterodox phrasing not
    # in the baseline allowlist); stamp-integrity is a non-blocking report (flags
    # gated files whose doctrinal lines changed after their content-review stamp).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # stamp-integrity needs history
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Orthodoxy tripwire scan (blocking)
        run: node tools/check-orthodoxy-tripwires.mjs
      - name: Answer openings lead-with-the-answer lint (blocking)
        run: node tools/check-answer-openings.mjs
      - name: Answer over-concession lint (blocking)
        run: node tools/check-answer-concessions.mjs
      - name: Stamp-integrity report (non-blocking)
        run: node tools/check-stamp-integrity.mjs --warn

  tests:
    # Deterministic code/content invariants (node:test, no dependencies): nav
    # single-source-of-truth, answers/_data.json integrity, content-review stamp
    # validity, api/ask.js guardrail presence, and static security checks
    # (service-role key never client-shipped; cron endpoints fail closed).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run test suite
        run: node --test tests/*.test.mjs
