<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Apologia Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy-950: #050d1a; --navy-900: #0a1628; --navy-700: #163058;
      --navy-600: #1e4278; --navy-500: #285a9e; --navy-300: #6f9fd4;
      --navy-100: #ddeaf5; --navy-50: #f0f6fb;
      --gold: #c8a951; --gold-light: #e8cf87;
      --white: #ffffff; --off-white: #f8f7f4;
      --text-dark: #0a1628; --text-mid: #3a4a62; --text-muted: #7a8fa8;
      --border: #d4e0ec; --error: #a32d2d; --error-bg: #fcebeb;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'Source Serif 4', Georgia, serif;
      --font-ui: 'DM Sans', system-ui, sans-serif;
    }
    body { font-family: var(--font-ui); background: var(--navy-950); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; }
    body::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(30,66,120,0.4) 0%, transparent 70%); pointer-events: none; }

    .card { background: var(--white); border-radius: 8px; padding: 2.5rem; width: 100%; max-width: 420px; position: relative; z-index: 1; }

    .logo { text-align: center; margin-bottom: 2rem; }
    .logo a { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; color: var(--navy-950); text-decoration: none; }
    .logo a span { color: var(--gold); }

    .card-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; color: var(--text-dark); margin-bottom: 0.25rem; text-align: center; }
    .card-sub { font-size: 0.88rem; color: var(--text-muted); text-align: center; margin-bottom: 2rem; }

    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--text-mid); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 4px; font-family: var(--font-ui); font-size: 0.95rem; color: var(--text-dark); outline: none; transition: border-color 0.2s; background: var(--off-white); }
    .form-input:focus { border-color: var(--navy-300); background: var(--white); }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input.error { border-color: var(--error); background: var(--error-bg); }

    .forgot-link { display: block; text-align: right; font-size: 0.78rem; color: var(--navy-500); text-decoration: none; margin-top: -0.75rem; margin-bottom: 1.25rem; }
    .forgot-link:hover { color: var(--navy-700); }

    .btn-primary { width: 100%; padding: 13px; border-radius: 4px; background: var(--navy-900); color: var(--white); font-family: var(--font-ui); font-size: 0.95rem; font-weight: 500; border: none; cursor: pointer; transition: background 0.2s; margin-bottom: 1rem; }
    .btn-primary:hover { background: var(--navy-700); }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }

    .error-box { background: var(--error-bg); border: 1px solid #f09595; border-radius: 4px; padding: 10px 14px; font-size: 0.85rem; color: var(--error); margin-bottom: 1rem; display: none; }
    .error-box.visible { display: block; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 1rem 0; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 0.78rem; color: var(--text-muted); }

    .switch-text { text-align: center; font-size: 0.85rem; color: var(--text-muted); }
    .switch-text a { color: var(--navy-500); text-decoration: none; font-weight: 500; }
    .switch-text a:hover { color: var(--navy-700); }

    .loading-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px; vertical-align: middle; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .back-link { position: absolute; top: 1.5rem; left: 1.5rem; font-size: 0.82rem; color: rgba(255,255,255,0.5); text-decoration: none; z-index: 1; display: flex; align-items: center; gap: 6px; }
    .back-link:hover { color: var(--white); }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Back to home</a>

  <div class="card">
    <div class="logo">
      <a href="index.html">Apologia<span>Daily</span></a>
    </div>

    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">Sign in to continue your apologetics journey</p>

    <div class="error-box" id="error-box"></div>

    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-input" type="password" id="password" placeholder="Your password" autocomplete="current-password" />
    </div>



    <button class="btn-primary" id="login-btn" onclick="handleLogin()">
      <span class="loading-spinner" id="spinner"></span>
      <span id="btn-text">Sign in</span>
    </button>

    <div class="switch-text">
      Don't have an account? <a href="signup.html">Create one free →</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  var sb = null;

  function initSb() {
    if (window.supabase && window.supabase.createClient) {
      sb = window.supabase.createClient(
        'https://noprgxkwniouukmrfozc.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vcHJneGt3bmlvdXVrbXJmb3pjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NjE1MTUsImV4cCI6MjA5NjEzNzUxNX0.GKmQgpndtaBUcz5SoT9H3bDsqjNSPixJJj4G3BrVkJw'
      );
      sb.auth.getSession().then(function(r) {
        if (r.data && r.data.session) window.location.href = 'dashboard.html';
      });
    } else {
      setTimeout(initSb, 50);
    }
  }
  document.addEventListener('DOMContentLoaded', initSb);

  async function handleLogin() {
    if (!sb) { showError('Still loading — please try again in a moment.'); return; }

    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var btn = document.getElementById('login-btn');
    var spinner = document.getElementById('spinner');
    var btnText = document.getElementById('btn-text');

    var errorBox = document.getElementById('error-box');
    if (errorBox) errorBox.classList.remove('visible');

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    btn.disabled = true;
    if (spinner) spinner.style.display = 'inline-block';
    if (btnText) btnText.textContent = 'Signing in…';

    try {
      var result = await sb.auth.signInWithPassword({ email: email, password: password });
      if (result.error) {
        var msg = result.error.message === 'Invalid login credentials'
          ? 'Incorrect email or password. Please try again.'
          : result.error.message;
        showError(msg);
        btn.disabled = false;
        if (spinner) spinner.style.display = 'none';
        if (btnText) btnText.textContent = 'Sign in';
      } else {
        window.location.href = 'dashboard.html';
      }
    } catch(e) {
      showError('Something went wrong. Please try again.');
      btn.disabled = false;
      if (spinner) spinner.style.display = 'none';
      if (btnText) btnText.textContent = 'Sign in';
    }
  }

  function showError(msg) {
    var box = document.getElementById('error-box');
    if (box) { box.textContent = msg; box.classList.add('visible'); }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
