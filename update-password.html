<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>Set a New Password — Apologia Daily</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy-950: #050d1a; --navy-900: #0a1628; --navy-700: #163058;
      --navy-600: #1e4278; --navy-500: #285a9e; --navy-300: #6f9fd4;
      --gold: #c8a951; --gold-light: #e8cf87;
      --white: #ffffff; --off-white: #f8f7f4;
      --text-dark: #0a1628; --text-mid: #3a4a62; --text-muted: #7a8fa8;
      --border: #d4e0ec; --error: #a32d2d; --error-bg: #fcebeb;
      --success: #0f6e56; --success-bg: #e1f5ee;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-ui: 'DM Sans', system-ui, sans-serif;
    }
    body { font-family: var(--font-ui); background: var(--navy-950); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; position: relative; overflow: hidden; }
    body::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(30,66,120,0.4) 0%, transparent 70%); pointer-events: none; }
    .card { background: var(--white); border-radius: 8px; padding: 2.5rem; width: 100%; max-width: 420px; position: relative; z-index: 1; }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo a { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; color: var(--navy-950); text-decoration: none; }
    .logo a span { color: var(--gold); }
    .card-title { font-family: var(--font-display); font-size: 1.5rem; font-weight: 600; color: var(--text-dark); margin-bottom: 0.25rem; text-align: center; }
    .card-sub { font-size: 0.88rem; color: var(--text-muted); text-align: center; margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.25rem; }
    .form-label { display: block; font-size: 0.82rem; font-weight: 500; color: var(--text-mid); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 4px; font-family: var(--font-ui); font-size: 0.95rem; color: var(--text-dark); outline: none; transition: border-color 0.2s; background: var(--off-white); }
    .form-input:focus { border-color: var(--navy-300); background: var(--white); }
    .pw-wrap { position: relative; }
    .pw-wrap .form-input { padding-right: 62px; }
    .pw-toggle { position: absolute; top: 50%; right: 8px; transform: translateY(-50%); background: none; border: none; font-family: var(--font-ui); font-size: 0.78rem; font-weight: 500; color: var(--navy-500); cursor: pointer; padding: 4px 6px; }
    .pw-toggle:hover { color: var(--navy-700); }
    .btn-primary { width: 100%; padding: 13px; border-radius: 4px; background: var(--navy-900); color: var(--white); font-family: var(--font-ui); font-size: 0.95rem; font-weight: 500; border: none; cursor: pointer; transition: background 0.2s; margin-bottom: 1rem; }
    .btn-primary:hover { background: var(--navy-700); }
    .btn-primary:disabled { opacity: 0.5; cursor: default; }
    .error-box { background: var(--error-bg); border: 1px solid #f09595; border-radius: 4px; padding: 10px 14px; font-size: 0.85rem; color: var(--error); margin-bottom: 1rem; display: none; line-height: 1.5; }
    .error-box.visible { display: block; }
    .success-box { background: var(--success-bg); border: 1px solid #9fe1cb; border-radius: 4px; padding: 14px; font-size: 0.9rem; color: var(--success); margin-bottom: 1rem; display: none; text-align: center; line-height: 1.6; }
    .success-box.visible { display: block; }
    .success-box a { color: var(--success); font-weight: 600; }
    .switch-text { text-align: center; font-size: 0.85rem; color: var(--text-muted); }
    .switch-text a { color: var(--navy-500); text-decoration: none; font-weight: 500; }
    .switch-text a:hover { color: var(--navy-700); }
    .loading-spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .back-link { position: absolute; top: 1.5rem; left: 1.5rem; font-size: 0.82rem; color: rgba(255,255,255,0.5); text-decoration: none; z-index: 1; }
    .back-link:hover { color: var(--white); }
  </style>
</head>
<body>
  <a href="login.html" class="back-link">← Back to sign in</a>

  <div class="card">
    <div class="logo">
      <a href="index.html">Apologia<span>Daily</span></a>
    </div>

    <h1 class="card-title">Set a new password</h1>
    <p class="card-sub">Choose a new password for your account</p>

    <div class="error-box" id="error-box"></div>
    <div class="success-box" id="success-box">
      ✓ Your password has been updated. <a href="login.html">Sign in →</a>
    </div>

    <div id="form-wrap">
      <div class="form-group">
        <label class="form-label" for="password">New password</label>
        <div class="pw-wrap">
          <input class="form-input" type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" />
          <button type="button" class="pw-toggle" id="pw-toggle" onclick="togglePw()" aria-label="Show password">Show</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="password2">Confirm new password</label>
        <input class="form-input" type="password" id="password2" placeholder="Re-enter your new password" autocomplete="new-password" />
      </div>
      <button class="btn-primary" id="update-btn" onclick="handleUpdate()">
        <span class="loading-spinner" id="spinner"></span>
        <span id="btn-text">Update password</span>
      </button>
      <div class="switch-text">
        Remembered it? <a href="login.html">Back to sign in</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.2/dist/umd/supabase.js" integrity="sha384-yifgV8iFWyp5cgu+V1G1rtlEHpEErPlL5fTrkUELIsWq0CIVDON2WP/NlXVJT3vO" crossorigin="anonymous"></script>
  <script>
    var sb = null;

    function boot() {
      if (!(window.supabase && window.supabase.createClient)) { setTimeout(boot, 50); return; }
      sb = window.supabase.createClient(
        'https://noprgxkwniouukmrfozc.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5vcHJneGt3bmlvdXVrbXJmb3pjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NjE1MTUsImV4cCI6MjA5NjEzNzUxNX0.GKmQgpndtaBUcz5SoT9H3bDsqjNSPixJJj4G3BrVkJw'
      );
      // Newer PKCE-style recovery links carry a ?code=; exchange it for a session.
      try {
        var code = new URLSearchParams(location.search).get('code');
        if (code && sb.auth.exchangeCodeForSession) { sb.auth.exchangeCodeForSession(code).catch(function(){}); }
      } catch (e) {}
      // Older implicit links carry the token in the URL hash; supabase-js auto-detects it
      // and fires PASSWORD_RECOVERY. Nothing else needed here.
    }
    document.addEventListener('DOMContentLoaded', boot);

    async function handleUpdate() {
      if (!sb) { showError('Still loading — please try again in a moment.'); return; }
      var pw = document.getElementById('password').value;
      var pw2 = document.getElementById('password2').value;
      var btn = document.getElementById('update-btn');
      var spinner = document.getElementById('spinner');
      var btnText = document.getElementById('btn-text');
      var errorBox = document.getElementById('error-box'); if (errorBox) errorBox.classList.remove('visible');

      if (!pw || pw.length < 8) { showError('Password must be at least 8 characters.'); return; }
      if (pw !== pw2) { showError('The two passwords don’t match.'); return; }

      btn.disabled = true; if (spinner) spinner.style.display = 'inline-block'; if (btnText) btnText.textContent = 'Updating…';

      try {
        var res = await sb.auth.updateUser({ password: pw });
        if (res.error) {
          var m = /session|not authenticated|missing|invalid|expired|jwt/i.test(res.error.message || '')
            ? 'This reset link is invalid or has expired. Please request a new one from the sign-in page.'
            : res.error.message;
          showError(m);
          btn.disabled = false; if (spinner) spinner.style.display = 'none'; if (btnText) btnText.textContent = 'Update password';
          return;
        }
        try { window.adTrack && window.adTrack('password_reset_completed'); } catch (x) {}
        document.getElementById('form-wrap').style.display = 'none';
        document.getElementById('success-box').classList.add('visible');
        // Sign out the temporary recovery session so they log in fresh with the new password.
        try { await sb.auth.signOut(); } catch (x) {}
      } catch (e) {
        showError('Something went wrong. Please request a new reset link and try again.');
        btn.disabled = false; if (spinner) spinner.style.display = 'none'; if (btnText) btnText.textContent = 'Update password';
      }
    }

    function showError(msg) {
      var box = document.getElementById('error-box');
      if (box) { box.textContent = msg; box.classList.add('visible'); }
    }

    function togglePw() {
      var p1 = document.getElementById('password');
      var p2 = document.getElementById('password2');
      var t = document.getElementById('pw-toggle');
      var show = p1.type === 'password';
      p1.type = show ? 'text' : 'password';
      if (p2) p2.type = show ? 'text' : 'password';
      t.textContent = show ? 'Hide' : 'Show';
      t.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    }

    document.addEventListener('keydown', function (e) { if (e.key === 'Enter') handleUpdate(); });
  </script>
  <script src="/analytics.js" defer></script>
</body>
</html>
